<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Worksheet Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls no-print">
        <h1>Worksheet Generator</h1>
        <div class="button-group">
            <button id="btnAdd" class="active">Addition</button>
            <button id="btnSub">Subtraction</button>
            <button id="btnMix">Mixed</button>
        </div>
        <div class="action-group">
            <button id="btnRandomize" class="primary">Randomize</button>
            <button id="btnPrint" class="secondary">Print</button>
        </div>
    </div>

    <div class="page-container">
        <div class="worksheet-grid" id="worksheet">
            <!-- Panels will be generated here -->
            <div class="panel">
                <div class="problem">1. 24 + 32 = __</div>
                <div class="number-line">
                    <div class="arrow-left"></div>
                    <div class="line"></div>
                    <div class="arrow-right"></div>
                </div>
            </div>
            <div class="panel">
                <div class="problem">2. 15 + 10 = __</div>
                <div class="number-line">
                    <div class="arrow-left"></div>
                    <div class="line"></div>
                    <div class="arrow-right"></div>
                </div>
            </div>
            <div class="panel">
                <div class="problem">3. 5 + 53 = __</div>
                <div class="number-line">
                    <div class="arrow-left"></div>
                    <div class="line"></div>
                    <div class="arrow-right"></div>
                </div>
            </div>
            <div class="panel">
                <div class="problem">4. 42 + 18 = __</div>
                <div class="number-line">
                    <div class="arrow-left"></div>
                    <div class="line"></div>
                    <div class="arrow-right"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
